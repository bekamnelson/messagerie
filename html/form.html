<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'Inscription</title>
    <link rel="stylesheet" href="./../css/form.css">
</head>
<body>
    <div class="signup-container">
        <h2>Inscription</h2>
        <form action="./../php/form.php" method="post" id="signupForm">
            <input type="text" name="username" placeholder="Nom d'utilisateur" id="username" required>
            <input type="email" name="email" placeholder="Email" id="email" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <input type="password" name="confirm_password" placeholder="Confirmer le mot de passe" required>
           <!--  <input type="file" name="profile_pic" accept="image/*" required>-->
            <button type="submit">S'inscrire</button>
        </form>
        <div class="footer">
            <p>Vous avez déjà un compte? <a href="./login.html" style="color: #6a11cb; text-decoration: none;">Se connecter</a></p>
        </div>
    </div>
    <script type="text/javascript" src="./../js/erreur1.js"></script>
</body>
</html>
