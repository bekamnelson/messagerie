<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie - Interface</title>
    <link rel="stylesheet" href="./../css/messagerie.css">
</head>

<body>
    <div class="navbar">
        <h1>Messagerie</h1>
    </div>
    <div class="content">
        <div class="contacts">
            <div class="contact">
                <img src="https://via.placeholder.com/40" alt="Alice">
                Alice
            </div>
            <div class="contact">
                <img src="https://via.placeholder.com/40" alt="Bob">
                Bob
            </div>
            <div class="contact">
                <img src="https://via.placeholder.com/40" alt="Charlie">
                Charlie
            </div>
            <div class="contact">
                <img src="https://via.placeholder.com/40" alt="Diana">
                Diana
            </div>
        </div>
        <div class="messages">
            <div class="message received">Bonjour, comment ça va?</div>
            <div class="message sent">Ça va bien, merci! Et toi?</div>
            <div class="message received">Content de l'entendre! Prêt pour notre réunion?</div>
            <div class="message sent">Oui, je suis prêt!</div>
            <div class="message received">Super! À tout de suite.</div>
            <div class="send-message">
                <input type="text" placeholder="Écrire un message..." />
                <button>Envoyer</button>
            </div>
        </div>
    </div>
</body>

</html>
